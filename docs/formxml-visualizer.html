<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FormXML Stage Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0e1116;
    --panel:#161b22;
    --panel-2:#1b222c;
    --border:#262f3b;
    --text:#e7ebf1;
    --text-dim:#8b94a3;
    --amber:#e8a33d;
    --amber-dim:#4a3a22;
    --cyan:#5ad4c8;
    --green:#6fcf97;
    --purple:#b18cf0;
    --pink:#f08fb0;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--text);font-family:'Inter',sans-serif;}
  body{padding:32px 28px 80px;min-height:100vh;}

  .wrap{max-width:1180px;margin:0 auto;}

  header.top{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;margin-bottom:22px;}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin:0 0 6px;}
  h1{margin:0;font-size:26px;font-weight:700;letter-spacing:-0.01em;}
  p.sub{margin:6px 0 0;color:var(--text-dim);font-size:14px;max-width:520px;line-height:1.5;}

  .stats{display:flex;gap:10px;flex-wrap:wrap;}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:8px 14px;text-align:right;min-width:76px;}
  .stat b{display:block;font-family:'IBM Plex Mono',monospace;font-size:18px;color:var(--text);}
  .stat span{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;}

  details.source{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:22px;overflow:hidden;}
  details.source summary{cursor:pointer;padding:14px 18px;font-size:13px;font-weight:600;color:var(--text-dim);list-style:none;display:flex;align-items:center;gap:8px;user-select:none;}
  details.source summary::-webkit-details-marker{display:none;}
  details.source summary::before{content:"▸";display:inline-block;transition:transform .15s ease;color:var(--amber);}
  details.source[open] summary::before{transform:rotate(90deg);}
  .source-body{padding:0 18px 18px;}
  textarea{width:100%;height:220px;background:var(--ink);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;line-height:1.6;padding:12px;resize:vertical;}
  textarea:focus{outline:2px solid var(--amber);outline-offset:1px;}

  .actions{display:flex;align-items:center;gap:12px;margin-top:12px;}
  button.visualize{background:var(--amber);color:#1a1206;border:none;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px;letter-spacing:.03em;padding:11px 20px;border-radius:8px;cursor:pointer;transition:transform .1s ease, box-shadow .15s ease;}
  button.visualize:hover{box-shadow:0 0 0 3px var(--amber-dim);}
  button.visualize:active{transform:scale(.97);}
  button.visualize:focus-visible{outline:2px solid var(--text);outline-offset:2px;}
  .parse-error{color:var(--pink);font-size:12px;font-family:'IBM Plex Mono',monospace;}

  #empty{padding:70px 20px;text-align:center;color:var(--text-dim);border:1px dashed var(--border);border-radius:var(--radius);font-size:14px;}
  #empty b{color:var(--text);}

  .pipeline{display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding:8px 4px 20px;}
  .seam{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;width:56px;flex:0 0 56px;padding-top:52px;}
  .seam .line{width:0;border-left:2px dashed var(--border);height:40px;}
  .seam .tag{writing-mode:vertical-rl;text-orientation:mixed;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--amber);letter-spacing:.06em;margin-top:6px;white-space:nowrap;}

  .stage{flex:0 0 260px;width:260px;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);margin-right:14px;opacity:0;transform:translateY(10px);animation:rise .45s ease forwards;overflow:hidden;}
  .stage:last-child{margin-right:0;}

  @keyframes rise{to{opacity:1;transform:translateY(0);}}

  .stage-head{padding:14px 16px 12px;border-bottom:1px solid var(--border);}
  .stage-num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);}
  .stage-name{font-size:16px;font-weight:700;margin:2px 0 8px;}
  .entity-badge{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 8px;border-radius:100px;background:var(--panel-2);border:1px solid var(--border);color:var(--cyan);letter-spacing:.03em;}
  .ribbon{height:4px;background:var(--panel-2);border-radius:2px;margin-top:10px;overflow:hidden;}
  .ribbon i{display:block;height:100%;background:linear-gradient(90deg,var(--amber),var(--pink));}

  .field-list{padding:6px 0;}
  .field{display:flex;gap:10px;align-items:flex-start;padding:9px 16px;border-bottom:1px solid rgba(255,255,255,0.03);opacity:0;animation:fieldIn .35s ease forwards;}
  .field:last-child{border-bottom:none;}
  @keyframes fieldIn{from{opacity:0;transform:translateX(-4px);}to{opacity:1;transform:translateX(0);}}

  .type-chip{flex:0 0 24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;}
  .field-text{min-width:0;}
  .field-label{font-size:13px;font-weight:500;color:var(--text);}
  .field-meta{font-size:10.5px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:26px;padding-top:18px;border-top:1px solid var(--border);}
  .legend-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-dim);}
  .legend-chip{width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;}

  @media (max-width:640px){
    body{padding:20px 14px 60px;}
    .stage{flex:0 0 220px;width:220px;}
  }
</style>
</head>
<body>
<div class="wrap">

    </div>
    <div class="stats" id="stats" style="display:none;">
      <div class="stat"><b id="statStages">0</b><span>Stages</span></div>
      <div class="stat"><b id="statFields">0</b><span>Fields</span></div>
      <div class="stat"><b id="statLookups">0</b><span>Lookups</span></div>
      <div class="stat"><b id="statEntities">0</b><span>Entities</span></div>
    </div>
  </header>

  <details class="source" open>
    <summary>Source FormXML</summary>
    <div class="source-body">
      <textarea id="xmlInput" spellcheck="false"></textarea>
      <div class="actions">
        <button class="visualize" id="vizBtn">Visualize ▸</button>
        <span class="parse-error" id="parseError"></span>
      </div>
    </div>
  </details>

  <div id="empty">Paste FormXML above and hit <b>Visualize</b> to see the stage pipeline.</div>
  <div class="pipeline" id="pipeline" style="display:none;"></div>

  <div class="legend" id="legend" style="display:none;"></div>

  if(!classid) return DEFAULT_TYPE;

function entityFromRelationship(rel){
  if(!rel) return null;
  const segments = rel.split('_');
  const last = segments[segments.length - 1];
  if(!/id$/i.test(last)) return null;
  const token = last.replace(/id$/i, '');
  if(!token) return null;
  return token.charAt(0).toUpperCase() + token.slice(1);
}

function parseFormXml(xmlStr){
  const doc = new DOMParser().parseFromString(xmlStr, 'application/xml');
  const perr = doc.querySelector('parsererror');
  if(perr) throw new Error('XML could not be parsed. Check for unclosed tags or invalid characters.');

  const tabs = Array.from(doc.querySelectorAll('tab'));
  if(tabs.length === 0) throw new Error('No <tab> elements found — is this a BPF FormXML export?');

  return tabs.map(tab => {
    const labelEl = tab.querySelector(':scope > labels > label');
    const stageLabel = labelEl ? labelEl.getAttribute('description') : tab.getAttribute('name');
    const controls = Array.from(tab.querySelectorAll('control'));
    const fields = controls.map(c => {
      const cell = c.closest('cell');
      const cellLabelEl = cell ? cell.querySelector(':scope > labels > label') : null;
      return {
        label: cellLabelEl ? cellLabelEl.getAttribute('description') : c.getAttribute('datafieldname'),
        datafieldname: c.getAttribute('datafieldname'),
        classid: c.getAttribute('classid'),
        relationship: c.getAttribute('relationship'),
      };
    });

    const entityCounts = {};
    fields.forEach(f => {
      const e = entityFromRelationship(f.relationship);
      if(e) entityCounts[e] = (entityCounts[e]||0) + 1;
    });
    const dominantEntity = Object.keys(entityCounts).sort((a,b)=>entityCounts[b]-entityCounts[a])[0] || null;

    return { name: tab.getAttribute('name'), label: stageLabel, fields, dominantEntity };
  });
}

function escapeHtml(str){
  if(str == null) return '';
  return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render(stages){
  const pipeline = document.getElementById('pipeline');
  const empty = document.getElementById('empty');
  const legend = document.getElementById('legend');
  const stats = document.getElementById('stats');

  pipeline.innerHTML = '';
  legend.innerHTML = '';

  const maxFields = Math.max(...stages.map(s => s.fields.length), 1);
  const usedTypes = new Set();
  let totalFields = 0, totalLookups = 0;
  const allEntities = new Set();
  let prevEntity = null;

  stages.forEach((stage, si) => {
    if(stage.dominantEntity && prevEntity && stage.dominantEntity !== prevEntity){
      const seam = document.createElement('div');
      seam.className = 'seam';
      seam.innerHTML = `<div class="line"></div><div class="tag">⇄ ${escapeHtml(prevEntity)} → ${escapeHtml(stage.dominantEntity)}</div>`;
      pipeline.appendChild(seam);
    }
    if(stage.dominantEntity){ prevEntity = stage.dominantEntity; allEntities.add(stage.dominantEntity); }

    const el = document.createElement('div');
    el.className = 'stage';
    el.style.animationDelay = (si * 90) + 'ms';

    const ribbonPct = Math.round((stage.fields.length / maxFields) * 100);

    el.innerHTML = `
      <div class="stage-head">
        <div class="stage-num">STAGE ${si+1} / ${stages.length}</div>
        <div class="stage-name">${escapeHtml(stage.label || stage.name)}</div>
        ${stage.dominantEntity ? `<span class="entity-badge">${escapeHtml(stage.dominantEntity)}</span>` : ''}
        <div class="ribbon"><i style="width:${ribbonPct}%"></i></div>
      </div>
      <div class="field-list"></div>
    `;

    const list = el.querySelector('.field-list');
    stage.fields.forEach((f, fi) => {
      totalFields++;
      if(f.classid && f.classid.replace(/[{}]/g,'').toUpperCase() === '270BD3DB-D9AF-4782-9025-509E298DEC0A') totalLookups++;
      const t = typeFor(f.classid);
      usedTypes.add(JSON.stringify(t));
      const row = document.createElement('div');
      row.className = 'field';
      row.style.animationDelay = (si * 90 + 140 + fi * 45) + 'ms';
      row.innerHTML = `
        <div class="type-chip" style="background:color-mix(in srgb, ${t.color} 18%, transparent); color:${t.color};">${t.icon}</div>
        <div class="field-text">
          <div class="field-label">${escapeHtml(f.label)}</div>
          <div class="field-meta">${escapeHtml(f.datafieldname)} · ${t.label}</div>
        </div>
      `;
      list.appendChild(row);
    });

    pipeline.appendChild(el);
  });

  Array.from(usedTypes).map(s => JSON.parse(s)).forEach(t => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-chip" style="background:color-mix(in srgb, ${t.color} 18%, transparent); color:${t.color};">${t.icon}</div>${t.label}`;
    legend.appendChild(item);
  });

  document.getElementById('statStages').textContent = stages.length;
  document.getElementById('statFields').textContent = totalFields;
  document.getElementById('statLookups').textContent = totalLookups;
  document.getElementById('statEntities').textContent = allEntities.size;

  empty.style.display = 'none';
  pipeline.style.display = 'flex';
  legend.style.display = 'flex';
  stats.style.display = 'flex';
}

document.getElementById('vizBtn').addEventListener('click', () => {
  const input = document.getElementById('xmlInput').value;
  const errEl = document.getElementById('parseError');
  errEl.textContent = '';
  try {
    const stages = parseFormXml(input);
    render(stages);
  } catch(e){
    errEl.textContent = e.message;
    document.getElementById('pipeline').style.display = 'none';
    document.getElementById('legend').style.display = 'none';
    document.getElementById('stats').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
  }
});
</script>
</body>
</html>
