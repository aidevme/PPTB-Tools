<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #EDF0EF;
    --surface: #FFFFFF;
    --surface-sunken: #F4F6F5;
    --ink: #16221F;
    --ink-soft: #566360;
    --ink-faint: #8A9592;
    --line: #DDE3E1;
    --line-strong: #C7D0CD;

    --spine-cold: #5E85A6;   /* Created */
    --spine-mid1: #4F9490;   /* Create Case */
    --spine-mid2: #4A9E74;   /* Identify */
    --spine-mid3: #6BA355;   /* Research */
    --spine-warm: #C98A33;   /* Resolve */

    --amber: #C98A33;
    --amber-soft: #FBF0DE;
    --danger: #B4543C;

    --radius: 14px;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:transparent;}
  body{
    font-family: var(--font-body);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  .app{
    background: var(--bg);
    min-height: 100%;
    padding: 32px 20px 60px;
  }

  .shell{
    max-width: 980px;
    margin: 0 auto;
  }

  /* ---- Header ---- */
  .topbar{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap: 20px;
    margin-bottom: 26px;
    flex-wrap: wrap;
  }
  .eyebrow{
    font-family: var(--font-mono);
    font-size: 11.5px;
    letter-spacing: .09em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin: 0 0 6px;
  }
  h1{
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 26px;
    letter-spacing: -0.01em;
    margin: 0;
  }
  .search-wrap{
    position: relative;
    min-width: 260px;
  }
  .search-wrap input{
    width: 100%;
    font-family: var(--font-body);
    font-size: 13.5px;
    padding: 10px 14px 10px 34px;
    border-radius: 10px;
    border: 1px solid var(--line-strong);
    background: var(--surface);
    color: var(--ink);
    outline: none;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .search-wrap input:focus{
    border-color: var(--spine-mid1);
    box-shadow: 0 0 0 3px rgba(79,148,144,0.14);
  }
  .search-wrap svg{
    position:absolute; left:11px; top:50%; transform:translateY(-50%);
    width:15px; height:15px; color: var(--ink-faint);
  }

  /* ---- Layout: spine + panel ---- */
  .board{
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 22px;
    align-items: start;
  }
  @media (max-width: 760px){
    .board{ grid-template-columns: 1fr; }
    .detail-panel{ position: static !important; }
  }

  .flow{
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* connecting spine */
  .flow::before{
    content:"";
    position:absolute;
    left: 19px;
    top: 22px;
    bottom: 22px;
    width: 2px;
    background: linear-gradient(180deg,
      var(--spine-cold) 0%,
      var(--spine-mid1) 26%,
      var(--spine-mid2) 52%,
      var(--spine-mid3) 76%,
      var(--spine-warm) 100%);
    opacity: .35;
    border-radius: 2px;
  }

  .stage{
    position: relative;
    padding-left: 46px;
  }

  .stage-node{
    position:absolute;
    left: 10px;
    top: 14px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--stage-color, var(--ink-faint));
    z-index: 2;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: box-shadow .2s ease;
  }
  .stage-node::after{
    content:"";
    width: 8px; height:8px;
    border-radius: 50%;
    background: var(--stage-color, var(--ink-faint));
    opacity: .55;
  }
  .stage.open .stage-node::after{ opacity: 1; }
  .stage.open .stage-node{
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--stage-color) 18%, transparent);
  }

  .stage-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .18s ease, box-shadow .18s ease;
  }
  .stage.open .stage-card{
    border-color: color-mix(in srgb, var(--stage-color) 45%, var(--line));
    box-shadow: 0 6px 20px -12px rgba(20,30,28,0.25);
  }

  .stage-head{
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap: 12px;
    padding: 13px 16px;
    cursor: pointer;
    user-select: none;
  }
  .stage-head-left{
    display:flex; align-items:center; gap:10px;
  }
  .stage-title{
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 15px;
    letter-spacing: -.005em;
  }
  .stage-count{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-soft);
    background: var(--surface-sunken);
    border: 1px solid var(--line);
    padding: 1px 7px;
    border-radius: 20px;
  }
  .chev{
    width: 16px; height:16px;
    color: var(--ink-faint);
    transition: transform .2s ease;
    flex-shrink: 0;
  }
  .stage.open .chev{ transform: rotate(180deg); }

  .stage-body{
    display: none;
    padding: 4px 16px 16px;
    border-top: 1px solid var(--line);
  }
  .stage.open .stage-body{ display:block; }

  .field-list{
    display:flex;
    flex-direction: column;
    gap: 6px;
    margin: 10px 0 12px;
  }

  .field-chip{
    display:flex;
    align-items:center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 10px;
    border: 1px solid transparent;
    background: var(--surface-sunken);
    cursor: grab;
    transition: background .15s ease, border-color .15s ease;
  }
  .field-chip:hover{ border-color: var(--line-strong); }
  .field-chip.selected{
    background: var(--amber-soft);
    border-color: color-mix(in srgb, var(--amber) 45%, transparent);
  }
  .field-chip.dragging{ opacity: .4; }

  .drag-handle{
    color: var(--ink-faint);
    width: 13px; flex-shrink:0;
    cursor: grab;
  }
  .field-name{
    font-size: 13.5px;
    font-weight: 500;
  }
  .field-entity{
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--ink-faint);
    background: var(--surface);
    border: 1px solid var(--line);
    padding: 1px 6px;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .field-req{
    font-size: 10.5px;
    color: var(--amber);
    font-weight: 600;
    margin-left: 2px;
  }
  .field-remove{
    margin-left: auto;
    width: 20px; height:20px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--ink-faint);
    cursor: pointer;
    display:flex; align-items:center; justify-content:center;
    opacity: 0;
    transition: opacity .12s ease, background .12s ease, color .12s ease;
  }
  .field-chip:hover .field-remove{ opacity: 1; }
  .field-remove:hover{ background: rgba(180,84,60,0.12); color: var(--danger); }
  .field-remove svg{ width:12px; height:12px; }

  .stage-empty{
    padding: 16px 4px 8px;
    color: var(--ink-soft);
    font-size: 13px;
    font-style: italic;
    line-height: 1.5;
  }

  .add-field-btn{
    display:inline-flex;
    align-items:center;
    gap: 6px;
    font-family: var(--font-body);
    font-size: 12.5px;
    font-weight: 500;
    color: var(--stage-color, var(--ink-soft));
    background: none;
    border: 1px dashed var(--line-strong);
    padding: 7px 12px;
    border-radius: 9px;
    cursor: pointer;
    transition: border-color .15s ease, background .15s ease;
  }
  .add-field-btn:hover{
    border-color: var(--stage-color, var(--ink-soft));
    background: color-mix(in srgb, var(--stage-color, var(--ink-soft)) 8%, transparent);
  }
  .add-field-btn svg{ width: 13px; height:13px; }

  /* ---- add-field popover ---- */
  .add-popover{
    display:none;
    margin-top: 8px;
    border: 1px solid var(--line-strong);
    border-radius: 10px;
    background: var(--surface);
    box-shadow: 0 12px 28px -14px rgba(20,30,28,0.35);
    overflow: hidden;
  }
  .add-popover.show{ display:block; }
  .add-popover input{
    width: 100%;
    border: none;
    border-bottom: 1px solid var(--line);
    padding: 10px 12px;
    font-size: 13px;
    font-family: var(--font-body);
    outline: none;
    background: var(--surface-sunken);
  }
  .add-popover-list{ max-height: 160px; overflow-y:auto; }
  .add-popover-item{
    display:flex; align-items:center; gap:8px;
    padding: 8px 12px;
    font-size: 13px;
    cursor: pointer;
  }
  .add-popover-item:hover{ background: var(--surface-sunken); }
  .add-popover-item .field-entity{ margin-left:auto; }

  /* ---- Detail panel ---- */
  .detail-panel{
    position: sticky;
    top: 20px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px;
  }
  .detail-eyebrow{
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin: 0 0 10px;
  }
  .detail-empty{
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.6;
  }
  .detail-name{
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    margin: 0 0 2px;
  }
  .detail-logical{
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-faint);
    margin: 0 0 16px;
    word-break: break-all;
  }
  .detail-row{
    display:flex;
    justify-content: space-between;
    align-items:center;
    padding: 10px 0;
    border-top: 1px solid var(--line);
    font-size: 13px;
  }
  .detail-row:first-of-type{ border-top: none; }
  .detail-row-label{ color: var(--ink-soft); }
  .detail-row-value{ font-weight: 500; }

  .toggle{
    position: relative;
    width: 34px; height: 19px;
    border-radius: 20px;
    background: var(--line-strong);
    cursor: pointer;
    transition: background .15s ease;
    flex-shrink:0;
  }
  .toggle.on{ background: var(--spine-mid2); }
  .toggle::after{
    content:"";
    position:absolute;
    top: 2px; left: 2px;
    width: 15px; height:15px;
    border-radius:50%;
    background: #fff;
    transition: transform .15s ease;
    box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }
  .toggle.on::after{ transform: translateX(15px); }

  .stage-badge-pill{
    display:inline-block;
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 20px;
    margin-bottom: 14px;
    color: #fff;
  }
</style>

<div class="app">
  <div class="shell">
    <div class="topbar">
      <div>
        <p class="eyebrow">IoT Alert &middot; Business Process Flow</p>
        <h1>Case Management stages</h1>
      </div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="globalSearch" type="text" placeholder="Filter fields across all stages…">
      </div>
    </div>

    <div class="board">
      <div class="flow" id="flow"></div>

      <div class="detail-panel" id="detailPanel">
        <p class="detail-eyebrow">Field properties</p>
        <div id="detailContent">
          <p class="detail-empty">Select a field on the left to view its properties, or add a new one to a stage.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const STAGES = [
  { id:'created', name:'Created', color:'var(--spine-cold)', open:false,
    fields:[
      { id:'f1', name:'Customer Asset', entity:'IoT Alert', logical:'msdyn_customerasset', type:'Lookup', required:true },
      { id:'f2', name:'Description', entity:'IoT Alert', logical:'msdyn_description', type:'Multiline Text', required:false },
      { id:'f3', name:'Alert Time', entity:'IoT Alert', logical:'msdyn_alerttime', type:'Date and Time', required:true },
    ]},
  { id:'createcase', name:'Create Case', color:'var(--spine-mid1)', open:true,
    fields:[
      { id:'f4', name:'Case Title', entity:'IoT Alert', logical:'msdyn_casetitle', type:'Single Line Text', required:true, selected:true },
      { id:'f5', name:'Find Customer', entity:'IoT Alert', logical:'msdyn_findcustomer', type:'Lookup', required:false },
    ]},
  { id:'identify', name:'Identify', color:'var(--spine-mid2)', open:false,
    fields:[
      { id:'f6', name:'Find Customer', entity:'IoT Alert', logical:'msdyn_findcustomer', type:'Lookup', required:false },
      { id:'f7', name:'Find Contact', entity:'IoT Alert', logical:'msdyn_findcontact', type:'Lookup', required:false },
    ]},
  { id:'research', name:'Research', color:'var(--spine-mid3)', open:false,
    fields:[
      { id:'f8', name:'Assign to Others', entity:'IoT Alert', logical:'msdyn_assigntoothers', type:'Owner', required:false },
    ]},
  { id:'resolve', name:'Resolve', color:'var(--spine-warm)', open:false, fields:[] },
];

const AVAILABLE_FIELDS = [
  { name:'Priority', logical:'msdyn_priority', type:'Choice' },
  { name:'Resolution Notes', logical:'msdyn_resolutionnotes', type:'Multiline Text' },
  { name:'Root Cause', logical:'msdyn_rootcause', type:'Choice' },
  { name:'Escalated', logical:'msdyn_escalated', type:'Two Options' },
  { name:'Follow-up Date', logical:'msdyn_followupdate', type:'Date and Time' },
];

let selectedFieldId = 'f4';
let openPopoverStage = null;

const flowEl = document.getElementById('flow');

function iconChevron(){
  return `<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>`;
}
function iconPlus(){
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>`;
}
function iconX(){
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>`;
}
function iconDrag(){
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><circle cx="9" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="18" r="1"/></svg>`;
}

function render(){
  flowEl.innerHTML = STAGES.map(stage => renderStage(stage)).join('');
  attachHandlers();
  renderDetail();
}

function renderStage(stage){
  const isOpen = stage.open;
  const fieldCount = stage.fields.length;
  const body = fieldCount === 0
    ? `<div class="stage-empty">This stage has no fields yet. Add one so agents know what to fill in before moving on.</div>
       ${renderAddButtonAndPopover(stage)}`
    : `<div class="field-list">
        ${stage.fields.map(f => renderField(stage, f)).join('')}
       </div>
       ${renderAddButtonAndPopover(stage)}`;

  return `
  <div class="stage ${isOpen ? 'open':''}" data-stage="${stage.id}" style="--stage-color:${stage.color}">
    <div class="stage-node"></div>
    <div class="stage-card">
      <div class="stage-head" data-toggle-stage="${stage.id}">
        <div class="stage-head-left">
          <span class="stage-title">${stage.name}</span>
          <span class="stage-count">${fieldCount} field${fieldCount===1?'':'s'}</span>
        </div>
        ${iconChevron()}
      </div>
      <div class="stage-body">${body}</div>
    </div>
  </div>`;
}

function renderField(stage, f){
  const selected = f.id === selectedFieldId;
  return `
  <div class="field-chip ${selected?'selected':''}" draggable="true"
       data-field-id="${f.id}" data-stage-id="${stage.id}">
    <span class="drag-handle">${iconDrag()}</span>
    <span class="field-name">${f.name}</span>
    ${f.required ? '<span class="field-req">required</span>' : ''}
    <span class="field-entity">${f.entity}</span>
    <button class="field-remove" data-remove-field="${f.id}" data-remove-stage="${stage.id}" title="Remove field">${iconX()}</button>
  </div>`;
}

function renderAddButtonAndPopover(stage){
  const isPopoverOpen = openPopoverStage === stage.id;
  return `
  <button class="add-field-btn" data-add-stage="${stage.id}" style="--stage-color:${stage.color}">
    ${iconPlus()} Add field
  </button>
  <div class="add-popover ${isPopoverOpen?'show':''}" data-popover-stage="${stage.id}">
    <input type="text" placeholder="Search IoT Alert fields…" data-popover-search="${stage.id}">
    <div class="add-popover-list">
      ${AVAILABLE_FIELDS.map(af => `
        <div class="add-popover-item" data-pick-field="${af.logical}" data-pick-stage="${stage.id}">
          <span>${af.name}</span>
          <span class="field-entity">${af.type}</span>
        </div>`).join('')}
    </div>
  </div>`;
}

function renderDetail(){
  const detailContent = document.getElementById('detailContent');
  let found = null, foundStage = null;
  for(const s of STAGES){
    const f = s.fields.find(x => x.id === selectedFieldId);
    if(f){ found = f; foundStage = s; break; }
  }
  if(!found){
    detailContent.innerHTML = `<p class="detail-empty">Select a field on the left to view its properties, or add a new one to a stage.</p>`;
    return;
  }
  detailContent.innerHTML = `
    <span class="stage-badge-pill" style="background:${foundStage.color}">${foundStage.name}</span>
    <p class="detail-name">${found.name}</p>
    <p class="detail-logical">${found.logical}</p>
    <div class="detail-row">
      <span class="detail-row-label">Type</span>
      <span class="detail-row-value">${found.type}</span>
    </div>
    <div class="detail-row">
      <span class="detail-row-label">Entity</span>
      <span class="detail-row-value">${found.entity}</span>
    </div>
    <div class="detail-row">
      <span class="detail-row-label">Required on stage</span>
      <div class="toggle ${found.required?'on':''}" data-toggle-required="${found.id}"></div>
    </div>
  `;
}

function attachHandlers(){
  document.querySelectorAll('[data-toggle-stage]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id = el.getAttribute('data-toggle-stage');
      const stage = STAGES.find(s=>s.id===id);
      stage.open = !stage.open;
      if(!stage.open) openPopoverStage = null;
      render();
    });
  });

  document.querySelectorAll('[data-field-id]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      if(e.target.closest('[data-remove-field]')) return;
      selectedFieldId = el.getAttribute('data-field-id');
      render();
    });
    el.addEventListener('dragstart', (e)=>{
      el.classList.add('dragging');
      e.dataTransfer.setData('text/plain', el.getAttribute('data-field-id'));
    });
    el.addEventListener('dragend', ()=> el.classList.remove('dragging'));
    el.addEventListener('dragover', (e)=> e.preventDefault());
    el.addEventListener('drop', (e)=>{
      e.preventDefault();
      const draggedId = e.dataTransfer.getData('text/plain');
      const stageId = el.getAttribute('data-stage-id');
      const stage = STAGES.find(s=>s.id===stageId);
      const fromIdx = stage.fields.findIndex(f=>f.id===draggedId);
      const toIdx = stage.fields.findIndex(f=>f.id===el.getAttribute('data-field-id'));
      if(fromIdx>-1 && toIdx>-1 && fromIdx!==toIdx){
        const [moved] = stage.fields.splice(fromIdx,1);
        stage.fields.splice(toIdx,0,moved);
        render();
      }
    });
  });

  document.querySelectorAll('[data-remove-field]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      const fid = el.getAttribute('data-remove-field');
      const sid = el.getAttribute('data-remove-stage');
      const stage = STAGES.find(s=>s.id===sid);
      stage.fields = stage.fields.filter(f=>f.id!==fid);
      if(selectedFieldId === fid) selectedFieldId = null;
      render();
    });
  });

  document.querySelectorAll('[data-add-stage]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      const sid = el.getAttribute('data-add-stage');
      openPopoverStage = openPopoverStage === sid ? null : sid;
      render();
      const input = document.querySelector(`[data-popover-search="${sid}"]`);
      if(input) input.focus();
    });
  });

  document.querySelectorAll('[data-pick-field]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const logical = el.getAttribute('data-pick-field');
      const sid = el.getAttribute('data-pick-stage');
      const af = AVAILABLE_FIELDS.find(a=>a.logical===logical);
      const stage = STAGES.find(s=>s.id===sid);
      const newField = {
        id: 'f_' + Math.random().toString(36).slice(2,8),
        name: af.name, entity: 'IoT Alert', logical: af.logical, type: af.type, required:false
      };
      stage.fields.push(newField);
      selectedFieldId = newField.id;
      openPopoverStage = null;
      render();
    });
  });

  document.querySelectorAll('[data-toggle-required]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const fid = el.getAttribute('data-toggle-required');
      for(const s of STAGES){
        const f = s.fields.find(x=>x.id===fid);
        if(f){ f.required = !f.required; }
      }
      render();
    });
  });
}

document.getElementById('globalSearch').addEventListener('input', (e)=>{
  const q = e.target.value.trim().toLowerCase();
  if(!q){
    document.querySelectorAll('.field-chip').forEach(el=> el.style.display = '');
    return;
  }
  document.querySelectorAll('.stage').forEach(stageEl=>{
    const sid = stageEl.getAttribute('data-stage');
    const stage = STAGES.find(s=>s.id===sid);
    const hasMatch = stage.fields.some(f=>f.name.toLowerCase().includes(q));
    if(hasMatch && !stage.open){ stage.open = true; }
  });
  render();
  document.querySelectorAll('.field-chip').forEach(el=>{
    const fid = el.getAttribute('data-field-id');
    let f = null;
    for(const s of STAGES){ const found = s.fields.find(x=>x.id===fid); if(found){ f = found; break; } }
    el.style.display = f && f.name.toLowerCase().includes(q) ? '' : 'none';
  });
});

render();
</script>
