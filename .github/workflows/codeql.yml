name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 3 * * 1'
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        id: analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          output: sarif-results

      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v6
        with:
          name: codeql-results-${{ matrix.language }}
          path: ${{ steps.analyze.outputs.sarif-output }}
          retention-days: 30

      # Skipped for pull_request: GITHUB_TOKEN is read-only for PRs from forks, and a PR run
      # shouldn't be pushing commits back to the target branch anyway.
      - name: Update last-run badge data
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p .github/badges
          echo "{\"schemaVersion\":1,\"label\":\"CodeQL\",\"message\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"color\":\"blue\"}" > .github/badges/codeql-last-run.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/codeql-last-run.json
          git diff --staged --quiet || git commit -m "chore: update CodeQL last-run badge"
          git push
