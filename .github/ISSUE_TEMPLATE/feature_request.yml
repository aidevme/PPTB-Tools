name: Feature Request
description: Suggest an enhancement for an existing PPTB tool
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: tool
    attributes:
      label: Related tool
      description: Which PPTB tool would this enhancement apply to?
      options:
        - PCF2BPF
        - Other / not tool-specific
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the limitation or pain point you're running into.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or change you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've tried.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, links, or other context.
    validations:
      required: false
