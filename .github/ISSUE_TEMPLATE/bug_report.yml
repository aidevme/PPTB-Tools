name: Bug Report
description: Report a problem with an existing PPTB tool
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: tool
    attributes:
      label: Affected tool
      description: Which PPTB tool does this bug affect?
      options:
        - PCF2BPF
        - Other / not tool-specific
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error messages
      description: Paste any relevant error messages or log output.
      render: shell
    validations:
      required: false

  - type: input
    id: pptb-version
    attributes:
      label: PPTB version
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Dataverse / environment details
      description: e.g. Dataverse version, region, online/on-premises.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, related issues, or anything else relevant.
    validations:
      required: false
